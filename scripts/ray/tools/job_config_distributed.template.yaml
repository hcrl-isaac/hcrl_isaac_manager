# Distributed-training variant of job_config.yaml -- used by `just ray job_distributed`.
#
# Differences from job_config.yaml:
#   * python_script is "WRAPPER+WRAPPER" so wrap_resources.py creates *two* sub-jobs from one
#     submission. Each lands on a different cluster GPU node (--gpu_per_worker 1 in the
#     interface script). The wrapper sets torchrun-style env vars by IP and exec's train.py
#     --distributed. See source/hcrl_isaaclab/scripts/ray/torchrun_wrapper.py.
#   * Everything else (env_file, file_mounts, py_executable, excludes) is identical.
env_file: ${MANAGER_DIR}/scripts/ray/.env.ray
user_id: ${UT_EID}
ext_dir: ${MANAGER_DIR}/resources/hcrl_isaaclab/scripts
# Two identical sub-jobs joined with `+` so wrap_resources splits and dispatches one per node.
# The wrapper assigns RANK from the worker's IP, so both sub-jobs can be byte-identical.
python_script: "/workspace/ext/hcrl_isaaclab/scripts/ray/torchrun_wrapper.py+/workspace/ext/hcrl_isaaclab/scripts/ray/torchrun_wrapper.py"
file_mounts: ${WORKSPACE_FILE_MOUNTS}
init_commands: []
"py_executable": "/isaac-sim/python.sh"
"excludes":
  - "**/resources/**"
  - "**/wandb/**"
  - "**/logs/**"
  - "**/.git/objects/**"
  - "**/.git/lfs/**"
  - "**/.venv/**"
  - "nohup.out"
  - "**/policies/g1_bfmzero_*"
