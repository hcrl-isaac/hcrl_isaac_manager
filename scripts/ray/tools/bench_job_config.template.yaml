# File containing environment variables (e.g. W&B credentials)
env_file: ${MANAGER_DIR}/scripts/ray/.env.ray
# UT EID (for tracking ownership of Ray jobs)
user_id: ${UT_EID}
# Working directory during job, should contain your scripts
ext_dir: ${MANAGER_DIR}/resources/IsaacLab/source/hcrl_isaaclab/scripts
# Train script to execute on cluster
python_script: "/workspace/isaaclab/source/hcrl_isaaclab/scripts/bench.py"
# Additional dependencies to mount at runtime (will also auto-install module dependencies if setup.py is present at root level)
file_mounts: {
  "${MANAGER_DIR}/resources/IsaacLab/source/hcrl_isaaclab": "/workspace/isaaclab/source/hcrl_isaaclab",
  "${MANAGER_DIR}/resources/IsaacLab/source/robot_rl": "/workspace/isaaclab/source/robot_rl",
}
init_commands: []
# python executable on the cluster
"py_executable": "/workspace/isaaclab/isaaclab.sh -p"
# patterns to exclude when copying dependencies (file_mounts) and working directory (ext_dir)
"excludes":
  - "**/resources/**"
  - "**/wandb/**"
  - "**/logs/**"
  - "**/.git/objects/**"
  - "**/.git/lfs/**"
  - "**/.venv/**"
  - "nohup.out"
  # the large exported BFM-Zero policy dir (fetched as a W&B artifact at runtime; >100MB blows
  # Ray's upload limit). Small git-tracked policies (e.g. g1_locomotion_jit.pt) ship with the job.
  - "**/policies/g1_bfmzero_q9q549nf**"
